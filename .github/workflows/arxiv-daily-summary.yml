name: arXiv Daily Summary

on:
  schedule:
    # Report generation at 22:00 KST (13:00 UTC) — runs after arXiv's daily /new
    # listing is reliably posted (arXiv announces ~20:00 ET = morning KST).
    - cron: "0 13 * * *"
    # Slack delivery at 10:00 KST (01:00 UTC) — announces the report generated the
    # evening before. Generation and notification are intentionally decoupled.
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      job:
        description: "report (generate the briefing) or notify (deliver Slack for the latest report)"
        required: false
        default: "report"
        type: choice
        options:
          - report
          - notify
      mode:
        description: "auto, daily, backfill, weekly, or sunday"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - daily
          - backfill
          - weekly
          - sunday
      target_date:
        description: "Optional target date for backfill/daily, in YYYY-MM-DD"
        required: false
        type: string
      send_slack:
        description: "Deliver Slack notification (notify job) if configured"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  actions: read

concurrency:
  group: paper-daily-summary-${{ github.ref }}
  cancel-in-progress: false

env:
  WORKDIR: ${{ github.workspace }}
  GITHUB_REPO: IIL-SNU/paper-daily-summary
  SITE_URL: https://iilab.io/paper-daily-summary
  SLACK_CHANNEL: "#paper-daily-summary"
  SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}   # GitHub secret으로 주입(예: C0XXXXXXX). 비우면 SLACK_CHANNEL 이름 사용
  SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}      # xoxb-... (chat:postMessage scope, 봇이 채널에 초대돼 있어야 함)
  SEND_SLACK: ${{ github.event.inputs.send_slack || 'true' }}
  # Evening report run stages the Slack message here; the morning notify run delivers and clears it.
  PENDING_FILE: stats/pending_slack.md

jobs:
  # ───────────────────────── Evening: generate the briefing ─────────────────────────
  report:
    name: Generate briefing (evening, arXiv-aligned)
    if: ${{ github.event.schedule == '0 13 * * *' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'report' || github.event.inputs.job == '')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      MODE: ${{ github.event.inputs.mode || 'auto' }}
      TARGET_DATE: ${{ github.event.inputs.target_date || '' }}
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify required secrets
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CLAUDE_CODE_OAUTH_TOKEN}" ]]; then
            echo "::error::Missing required repository secret CLAUDE_CODE_OAUTH_TOKEN."
            echo "::error::Generate it locally with 'claude setup-token' (needs a Claude Pro/Max subscription) and add it under Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [[ -z "${SLACK_BOT_TOKEN}" ]]; then
            echo "::warning::SLACK_BOT_TOKEN is not configured. The morning Slack delivery will be skipped."
          fi

      - name: Install Claude Code CLI
        shell: bash
        run: |
          set -euo pipefail
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Prepare run prompt
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          cat > out/ci_prompt.md <<'EOF'
          Run the arXiv Daily Briefing release workflow inside GitHub Actions.

          Repository: IIL-SNU/paper-daily-summary
          Workdir: ${WORKDIR}
          Site URL: ${SITE_URL}
          Slack channel: ${SLACK_CHANNEL}
          Slack channel ID: ${SLACK_CHANNEL_ID}
          Requested mode: ${MODE}
          Requested target date: ${TARGET_DATE}

          Follow prompts/instruction.md as the authoritative runbook.

          Required behavior:
          1. Use repository parser scripts for arXiv /new and /pastweek data.
          2. Do not summarize arXiv list pages manually.
          3. In auto mode, run Calendar Audit first and fill missing weekdays in chronological order.
          4. If target_date is older than the current /new listing date, use Backfill mode and scripts/fetch_arxiv_pastweek_date.py.
          5. Generate or update required artifacts: posts, trends, benchmarks, insights, weekly when applicable, feed.xml, index.html, and stats if present.
          6. Run the validation/release gates described in the instruction file.
          7. Commit and push only if all release gates pass.
          8. Write the Slack message body to out/slack_message.txt after success or intentional no-op.
          9. Write out/release_ok.txt after a successful release, or out/no_release.txt after an intentional no-op.
          10. If a required gate fails, exit non-zero and do not claim success.

          Git identity if a commit is needed:
          - user.name: arxiv-daily-bot
          - user.email: actions@github.com
          EOF
          python - <<'PY'
          from pathlib import Path
          import os
          p = Path('out/ci_prompt.md')
          text = p.read_text(encoding='utf-8')
          for key in ['WORKDIR', 'SITE_URL', 'SLACK_CHANNEL', 'SLACK_CHANNEL_ID', 'MODE', 'TARGET_DATE']:
              text = text.replace('${' + key + '}', os.environ.get(key, ''))
          p.write_text(text, encoding='utf-8')
          PY

      - name: Run Claude Code release agent
        shell: bash
        run: |
          set -euo pipefail
          # Headless CI: no interactive approver, so bypass permission prompts.
          # (Safe on GitHub-hosted runners; they run as non-root 'runner'.)
          claude --dangerously-skip-permissions -p "$(cat out/ci_prompt.md)"

      - name: Finalize commit, stage Slack message, and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "arxiv-daily-bot"
          git config user.email "actions@github.com"

          if [[ -f out/release_ok.txt ]]; then
            echo "Release marker found. Staging the Slack message for the morning notify job."
            # The agent writes the human-facing message to out/slack_message.txt (gitignored).
            # Persist it to a tracked file so the decoupled morning job can deliver it.
            if [[ -f out/slack_message.txt ]]; then
              cp out/slack_message.txt "${PENDING_FILE}"
            else
              echo "Imaging Intelligence Daily Briefing published. Site: ${SITE_URL}" > "${PENDING_FILE}"
            fi
            for path in posts trends benchmarks insights weekly feed.xml index.html stats; do
              if [[ -e "$path" ]]; then
                git add "$path"
              fi
            done
            git add "${PENDING_FILE}"
            if git diff --cached --quiet; then
              echo "No staged changes remain."
            else
              DATE_TAG="${TARGET_DATE:-$(date +%F)}"
              git commit -m "Update arXiv daily summary (${DATE_TAG})"
              git push origin HEAD:main
            fi
          elif [[ -f out/no_release.txt ]]; then
            echo "No-release marker found (intentional no-op). No Slack pending; morning stays silent."
            cat out/no_release.txt
          else
            echo "::error::Neither out/release_ok.txt nor out/no_release.txt exists."
            exit 1
          fi

      - name: Stage failure alert for the next Slack window
        if: ${{ failure() }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "arxiv-daily-bot"
          git config user.email "actions@github.com"
          printf '⚠️ *Imaging Intelligence Daily Briefing failed* — 점검: %s/%s/actions/runs/%s' \
            "${GITHUB_SERVER_URL}" "${GITHUB_REPOSITORY}" "${GITHUB_RUN_ID}" > "${PENDING_FILE}"
          git add "${PENDING_FILE}"
          git commit -m "Stage failure alert for next Slack window" || true
          git pull --rebase origin main || true
          git push origin HEAD:main || true

      - name: Upload run artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: paper-daily-summary-run-${{ github.run_id }}
          path: |
            out/*.json
            out/*.txt
            out/*.md
          if-no-files-found: ignore

  # ───────────────────────── Morning: deliver Slack ─────────────────────────
  notify:
    name: Deliver Slack for latest report (morning)
    if: ${{ github.event.schedule == '0 1 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.job == 'notify') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Deliver pending Slack message (bot)
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${SEND_SLACK}" != "true" ]]; then
            echo "Slack delivery disabled by workflow input."
            exit 0
          fi
          if [[ -z "${SLACK_BOT_TOKEN}" ]]; then
            echo "SLACK_BOT_TOKEN is not configured; skipping Slack delivery."
            exit 0
          fi
          if [[ ! -s "${PENDING_FILE}" ]]; then
            echo "No pending report (intentional no-op / weekend); staying silent."
            exit 0
          fi
          TARGET="${SLACK_CHANNEL_ID:-$SLACK_CHANNEL}"
          if [[ -z "${TARGET}" ]]; then
            echo "::error::No Slack channel set (SLACK_CHANNEL_ID preferred, or SLACK_CHANNEL)."
            exit 1
          fi
          export MESSAGE="$(cat "${PENDING_FILE}")" TARGET

          python - <<'PY'
          import json, os
          payload = {
              "channel": os.environ["TARGET"],
              "text": os.environ.get("MESSAGE", ""),
              "mrkdwn": True,
              "unfurl_links": False,
          }
          with open('out_slack_payload.json', 'w', encoding='utf-8') as f:
              json.dump(payload, f, ensure_ascii=False)
          PY

          curl -sS -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H 'Content-type: application/json; charset=utf-8' \
            --data @out_slack_payload.json > out_slack_resp.json
          echo "Slack API response: $(cat out_slack_resp.json)"

          # Slack returns HTTP 200 with {"ok":false,"error":...} on failure — check the body.
          if python3 -c "import json,sys; sys.exit(0 if json.load(open('out_slack_resp.json')).get('ok') else 1)"; then
            echo "Delivered. Clearing the pending message."
            git config user.name "arxiv-daily-bot"
            git config user.email "actions@github.com"
            git rm -q "${PENDING_FILE}"
            git commit -m "Clear delivered Slack message"
            git pull --rebase origin main || true
            git push origin HEAD:main
          else
            ERR="$(python3 -c "import json; print(json.load(open('out_slack_resp.json')).get('error','unknown'))")"
            echo "::warning::Slack chat.postMessage failed: ${ERR}; leaving pending for the next window."
          fi
